description: |
  လခစားကုမ္ပဏီဝန်ထမ်း Sasaki တစ်ယောက်​ ပင်ပန်းလှတဲ့တစ်နေ့တာကိုဖြတ်သန်းပြီးသကာလ ညစဉ် convenience store လေးတစ်ခုကိုဝင်ဝင်ဖြစ်တယ်။ ဝယ်စရာရှိနေလို့တော့မဟုတ်ပါဘူး။ အမြဲတမ်း​ အပြုံးပန်းဆင်ထားတဲ့ Yamada​ ဆိုတဲ့​ ကောင်တာဝန်ထမ်းမလေးတစ်ယောက်ကြောင့်ပါ။
  
  တစ်ညတော့ Sasaki တစ်ယောက်​ ​ညဉ့်နက်လွန်းတဲ့အထိ​ ကုမ္ပဏီမီတင်တက်နေရတာကြောင့် ဆိုင်ကိုဝင်တဲ့အခါ Yamada ကတော့အလုပ်ဆင်းသွားရှာပါပြီ။ သို့နှင့် Sasaki တစ်ယောက် စိတ်ပျက်ပျက်ဖြင့်​ ဆေးလိပ်သောက်ရန်နေရာရှာနေခိုက် ဆိုင်နောက်ဖက်မှ​ ကောင်မလေးတစ်ယောက် ဆေးလိပ်သောက်ရန်လှမ်းခေါ်သောအခါ...​