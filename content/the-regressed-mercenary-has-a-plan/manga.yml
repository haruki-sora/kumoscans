description: |
  ကြေးစားစစ်သားတပ်ဖွဲ့ခေါင်း​ဆောင်​ Ghislain Perdium...
  တိုက်ကြီးတစ်တိုက်လုံးရဲ့ အစွမ်းဆုံးလူ ခုနစ်ယောက်ထဲကတစ်ယောက်အပါအဝင်ဖြစ်သူ...
  ကျဆုံးသွားတဲ့ သူ၏မိသားစုအတွက် လက်စားချေ ချင်သူ...

  အရာရာ​ Ghislain​ ၏လက်စားချေမည့်အစီအစဉ်အတိုင်းဖြစ်နေသော်လဲ Idun တစ်ယောက်ပါလာသောအခါ...
  Ghislain​ ဟာ​ Idun​ လက်ထဲမှာ သူခေါင်းပြတ်သွားပြီဟုထင်လိုက်သော်လဲ သူ၏မိသားစုကျဆုံးခန်းမတိုင်ခင်​ ငယ်ဘဝကိုပြန်ရောက်သွားလေသည်။ 

  ဤသို့အမှတ်မထင်ကံကောင်းထောက်မစွာ ရလာတဲ့ဒုတိယအခွင့်အရေးကို​ ဘယ်လိုအသုံးချမလဲ။ အနာဂတ်ကိုကြိုသိနေသော တစ်ဦးတည်းသောသူအဖြစ် သူ့မိသားစုကျဆုံးခန်းကို တားဆီးနိုင်မလား။ Ghislain တစ်ယောက်အနာဂတ်ကို ပြင်ရေးနိုင်မည်လော...